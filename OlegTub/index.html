<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OlegTube — фото и видео (бесплатно)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #d0e2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app-container {
            max-width: 580px;
            width: 100%;
            background: #eef4fc;
            border-radius: 12px;
            overflow: hidden;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border-top: 3px solid #3b6e9e;
        }
        .app-header {
            background: #3b6e9e;
            padding: 14px 20px;
        }
        .app-header h1 {
            font-size: 1.9rem;
            color: white;
        }
        .app-header p {
            font-size: 0.7rem;
            color: #cfe3fc;
        }
        .feed-area { flex: 1; overflow-y: auto; padding: 16px; }
        .post-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #bdd4e8;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2c6e9e, #1f4e73);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .post-author { display: flex; gap: 12px; align-items: center; }
        .author-name { font-weight: bold; color: #0f2e4a; }
        .post-date { font-size: 0.7rem; color: #6c8eae; margin-top: 2px; }
        .post-text { margin-top: 12px; color: #1a2c3e; }
        .post-media {
            margin-top: 12px;
            border-radius: 16px;
            overflow: hidden;
            max-height: 400px;
        }
        .post-media img, .post-media video {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            background: #000;
        }
        .post-actions {
            margin-top: 14px;
            display: flex;
            gap: 24px;
            color: #5b7f9e;
            cursor: pointer;
        }
        .empty-feed { text-align: center; padding: 48px; color: #6c8eae; }
        .bottom-nav {
            background: #2c5a7c;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
        }
        .nav-item {
            background: none;
            border: none;
            color: #d4e6fc;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .nav-item.active { background: #1f4a6e; color: #ffdd99; }
        .create-btn-nav { background: #f4b642; color: #2c3e2b; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
        .hide { display: none; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
        }
        .modal-card textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #bdd4e8;
            margin: 16px 0;
            font-family: inherit;
            resize: vertical;
        }
        .media-preview {
            margin: 12px 0;
            border-radius: 16px;
            overflow: hidden;
            max-height: 200px;
        }
        .media-preview img, .media-preview video {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
        }
        .media-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .media-btn {
            background: #e2edf9;
            border: 1px solid #bdd4e8;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .modal-actions button {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .modal-actions button.primary { background: #2c6e9e; color: white; }
        .search-input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #b0c9e2;
            margin-bottom: 16px;
        }
        .search-result-item {
            background: white;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            border-left: 4px solid #3b6e9e;
        }
        .profile-card { text-align: center; padding: 24px; }
        .big-avatar {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #2c6e9e, #1f4e73);
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }
        .info-message {
            background: #fff1cf;
            padding: 16px;
            border-radius: 16px;
            margin-top: 20px;
        }
        .user-posts-container { margin-top: 20px; }
        .delete-post-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1rem;
            margin-left: auto;
        }
        .loading { text-align: center; padding: 20px; color: #6c8eae; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>OlegTube</h1>
        <p>✦ фото • видео • как в Telegram ✦</p>
    </div>

    <div class="feed-area" id="mainContentArea">
        <div id="feedPanel"><div id="postsContainer"></div></div>
        <div id="searchPanel" class="hide">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск...">
            <div id="searchResultsContainer"></div>
        </div>
        <div id="profilePanel" class="hide">
            <div class="profile-card">
                <div class="big-avatar" id="profileAvatar"></div>
                <h2 id="profileName"></h2>
                <div class="info-message">
                    📝 ваших постов: <span id="userPostCount">0</span><br>
                    📸 фото и видео загружаются бесплатно
                </div>
            </div>
            <div id="userPostsContainer"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" id="navHome"><i class="fas fa-home"></i><span>Главная</span></button>
        <button class="nav-item" id="navSearch"><i class="fas fa-search"></i><span>Поиск</span></button>
        <button class="nav-item create-btn-nav" id="navCreatePost"><i class="fas fa-plus-circle"></i><span>Создать</span></button>
        <button class="nav-item" id="navProfile"><i class="fas fa-user-alt"></i><span>Профиль</span></button>
    </div>
</div>

<div id="createModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Новый пост</h3>
        <textarea id="postText" rows="3" placeholder="Что нового?"></textarea>
        <div id="mediaPreview" class="media-preview" style="display: none;"></div>
        <div class="media-buttons">
            <button id="photoBtn" class="media-btn"><i class="fas fa-image"></i> Фото</button>
            <button id="videoBtn" class="media-btn"><i class="fas fa-video"></i> Видео</button>
            <button id="removeMediaBtn" class="media-btn" style="display: none;"><i class="fas fa-trash"></i> Удалить</button>
        </div>
        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;">
        <div class="modal-actions">
            <button id="cancelModalBtn">Отмена</button>
            <button id="confirmPostBtn" class="primary">Опубликовать</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, onSnapshot } from "firebase/firestore";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDuJfaJAvigdDsCkeLoHpM3QG30YANa5tU",
        authDomain: "olegtub-69d16.firebaseapp.com",
        projectId: "olegtub-69d16",
        storageBucket: "olegtub-69d16.firebasestorage.app",
        messagingSenderId: "899139233363",
        appId: "1:899139233363:web:d18229151ec65c5cd4c8a6"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // ========== ПОЛЬЗОВАТЕЛИ ==========
    function getUserId() {
        let id = localStorage.getItem('olegtub_user_id');
        if (!id) {
            id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('olegtub_user_id', id);
        }
        return id;
    }
    
    function getUserName() {
        let name = localStorage.getItem('olegtub_user_name');
        if (!name) {
            name = prompt("Введите ваше имя:", "Пользователь");
            if (!name?.trim()) name = "Аноним";
            localStorage.setItem('olegtub_user_name', name);
        }
        return name;
    }
    
    // ========== ЗАГРУЗКА НА FREEIMAGE.HOST (БЕСПЛАТНО) ==========
    async function uploadToFreeImage(file) {
        const formData = new FormData();
        formData.append('source', file);
        formData.append('type', 'file');
        
        // Бесплатный API ключ FreeImage.host (рабочий)
        formData.append('key', '6d207e02198a847aa98d0a2a901485a5');
        
        const response = await fetch('https://freeimage.host/api/1/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        if (data.status_code === 200) {
            return data.image.url;
        } else {
            throw new Error('Ошибка загрузки');
        }
    }
    
    // ========== ПОСТЫ ==========
    let currentPanel = 'home';
    let allPosts = [];
    let unsubscribe = null;
    let currentFile = null;
    let currentFileType = null;
    
    async function getAllPosts() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        const snapshot = await getDocs(q);
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() || new Date() }));
    }
    
    async function addPost(text, mediaUrl, mediaType) {
        if (!text?.trim() && !mediaUrl) throw new Error("Добавьте текст или медиа");
        
        await addDoc(collection(db, "posts"), {
            author: getUserName(),
            text: text?.trim() || "",
            timestamp: new Date(),
            userId: getUserId(),
            likes: [],
            likesCount: 0,
            mediaUrl: mediaUrl || null,
            mediaType: mediaType || null
        });
    }
    
    async function deletePost(postId) {
        const postRef = doc(db, "posts", postId);
        const snap = await getDoc(postRef);
        if (snap.data().userId !== getUserId()) throw new Error("Не ваше");
        await deleteDoc(postRef);
    }
    
    async function toggleLike(postId) {
        const userId = getUserId();
        const ref = doc(db, "posts", postId);
        const snap = await getDoc(ref);
        const has = snap.data().likes?.includes(userId);
        if (has) {
            await updateDoc(ref, { likes: arrayRemove(userId), likesCount: snap.data().likesCount - 1 });
        } else {
            await updateDoc(ref, { likes: arrayUnion(userId), likesCount: (snap.data().likesCount || 0) + 1 });
        }
    }
    
    async function getUserPosts() {
        const q = query(collection(db, "posts"), where("userId", "==", getUserId()), orderBy("timestamp", "desc"));
        const snapshot = await getDocs(q);
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() || new Date() }));
    }
    
    // ========== UI ==========
    function formatDate(date) {
        if (!date) return "только что";
        const diff = Math.floor((new Date() - date) / 60000);
        if (diff < 1) return "только что";
        if (diff < 60) return `${diff} мин назад`;
        if (diff < 1440) return `${Math.floor(diff / 60)} ч назад`;
        return `${Math.floor(diff / 1440)} дн назад`;
    }
    
    function renderMedia(url, type) {
        if (!url) return '';
        if (type === 'image') return `<div class="post-media"><img src="${url}" loading="lazy" onclick="window.open('${url}','_blank')"></div>`;
        if (type === 'video') return `<div class="post-media"><video src="${url}" controls preload="metadata"></video></div>`;
        return '';
    }
    
    function renderFeed() {
        const container = document.getElementById('postsContainer');
        if (!allPosts.length) {
            container.innerHTML = '<div class="empty-feed">📭 Нет постов. Создайте первый!</div>';
            return;
        }
        const userId = getUserId();
        container.innerHTML = allPosts.map(post => `
            <div class="post-card">
                <div class="post-author">
                    <div class="avatar">${(post.author[0] || 'A').toUpperCase()}</div>
                    <div><div class="author-name">${escapeHtml(post.author)}</div><div class="post-date">${formatDate(post.timestamp)}</div></div>
                    ${post.userId === userId ? `<button class="delete-post-btn" data-id="${post.id}"><i class="fas fa-trash"></i></button>` : ''}
                </div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${renderMedia(post.mediaUrl, post.mediaType)}
                <div class="post-actions">
                    <span class="like-btn" data-id="${post.id}">
                        <i class="${post.likes?.includes(userId) ? 'fas fa-heart' : 'far fa-heart'}" style="${post.likes?.includes(userId) ? 'color:#e74c3c' : ''}"></i>
                        <span>${post.likesCount || 0}</span>
                    </span>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.like-btn').forEach(btn => btn.onclick = () => toggleLike(btn.dataset.id));
        document.querySelectorAll('.delete-post-btn').forEach(btn => btn.onclick = async () => { if(confirm('Удалить?')) { await deletePost(btn.dataset.id); } });
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }
    
    async function updateProfile() {
        const name = getUserName();
        document.getElementById('profileName').innerText = name;
        document.getElementById('profileAvatar').innerText = name[0].toUpperCase();
        document.getElementById('userPostCount').innerText = (await getUserPosts()).length;
        
        const userPosts = await getUserPosts();
        const container = document.getElementById('userPostsContainer');
        if (!userPosts.length) { container.innerHTML = '<div class="empty-feed">У вас пока нет постов</div>'; return; }
        container.innerHTML = userPosts.map(post => `
            <div class="post-card">
                <div class="post-author"><div class="avatar">${(post.author[0] || 'A').toUpperCase()}</div><div><div class="author-name">${escapeHtml(post.author)}</div><div class="post-date">${formatDate(post.timestamp)}</div></div><button class="delete-post-btn" data-id="${post.id}"><i class="fas fa-trash"></i></button></div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${renderMedia(post.mediaUrl, post.mediaType)}
            </div>
        `).join('');
        document.querySelectorAll('#userPostsContainer .delete-post-btn').forEach(btn => btn.onclick = async () => { if(confirm('Удалить?')) { await deletePost(btn.dataset.id); await updateProfile(); } });
    }
    
    async function searchPosts(q) {
        const container = document.getElementById('searchResultsContainer');
        if (!q.trim()) { container.innerHTML = '<div class="empty-feed">Введите текст поиска</div>'; return; }
        const results = allPosts.filter(p => p.author.toLowerCase().includes(q.toLowerCase()) || p.text.toLowerCase().includes(q.toLowerCase()));
        if (!results.length) { container.innerHTML = '<div class="empty-feed">Ничего не найдено</div>'; return; }
        container.innerHTML = results.map(p => `<div class="search-result-item"><strong>${escapeHtml(p.author)}</strong><br>${escapeHtml(p.text.substring(0, 100))}</div>`).join('');
    }
    
    // ========== МОДАЛКА ==========
    const modal = document.getElementById('createModal');
    const postText = document.getElementById('postText');
    const fileInput = document.getElementById('fileInput');
    const photoBtn = document.getElementById('photoBtn');
    const videoBtn = document.getElementById('videoBtn');
    const removeMediaBtn = document.getElementById('removeMediaBtn');
    const mediaPreview = document.getElementById('mediaPreview');
    
    photoBtn.onclick = () => { fileInput.accept = 'image/*'; fileInput.click(); };
    videoBtn.onclick = () => { fileInput.accept = 'video/*'; fileInput.click(); };
    
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFile = file;
        currentFileType = file.type.startsWith('image/') ? 'image' : 'video';
        
        const url = URL.createObjectURL(file);
        if (currentFileType === 'image') mediaPreview.innerHTML = `<img src="${url}">`;
        else mediaPreview.innerHTML = `<video src="${url}" controls></video>`;
        mediaPreview.style.display = 'block';
        removeMediaBtn.style.display = 'inline-block';
    };
    
    removeMediaBtn.onclick = () => {
        currentFile = null;
        currentFileType = null;
        mediaPreview.innerHTML = '';
        mediaPreview.style.display = 'none';
        removeMediaBtn.style.display = 'none';
        fileInput.value = '';
    };
    
    async function submitPost() {
        const text = postText.value;
        if (!text?.trim() && !currentFile) { alert("Напишите текст или добавьте фото/видео"); return; }
        
        let mediaUrl = null;
        if (currentFile) {
            document.getElementById('confirmPostBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Загрузка...';
            try {
                mediaUrl = await uploadToFreeImage(currentFile);
            } catch(e) { alert("Ошибка загрузки: " + e.message); document.getElementById('confirmPostBtn').innerHTML = 'Опубликовать'; return; }
        }
        
        await addPost(text, mediaUrl, currentFileType);
        closeModal();
        document.getElementById('confirmPostBtn').innerHTML = 'Опубликовать';
        postText.value = '';
        removeMediaBtn.click();
    }
    
    function openModal() { modal.classList.add('active'); postText.value = ''; removeMediaBtn.click(); }
    function closeModal() { modal.classList.remove('active'); }
    
    // ========== НАВИГАЦИЯ ==========
    function setPanel(panel) {
        document.getElementById('feedPanel').classList.add('hide');
        document.getElementById('searchPanel').classList.add('hide');
        document.getElementById('profilePanel').classList.add('hide');
        if (panel === 'home') { document.getElementById('feedPanel').classList.remove('hide'); renderFeed(); }
        if (panel === 'search') { document.getElementById('searchPanel').classList.remove('hide'); const inp = document.getElementById('searchInput'); inp.oninput = (e) => searchPosts(e.target.value); }
        if (panel === 'profile') { document.getElementById('profilePanel').classList.remove('hide'); updateProfile(); }
        currentPanel = panel;
        [navHome, navSearch, navProfile].forEach(b => b.classList.remove('active'));
        if (panel === 'home') navHome.classList.add('active');
        if (panel === 'search') navSearch.classList.add('active');
        if (panel === 'profile') navProfile.classList.add('active');
    }
    
    const navHome = document.getElementById('navHome');
    const navSearch = document.getElementById('navSearch');
    const navProfile = document.getElementById('navProfile');
    navHome.onclick = () => setPanel('home');
    navSearch.onclick = () => setPanel('search');
    navProfile.onclick = () => setPanel('profile');
    document.getElementById('navCreatePost').onclick = openModal;
    document.getElementById('confirmPostBtn').onclick = submitPost;
    document.getElementById('cancelModalBtn').onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); };
    
    const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    unsubscribe = onSnapshot(q, (snap) => {
        allPosts = snap.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() || new Date() }));
        if (currentPanel === 'home') renderFeed();
        if (currentPanel === 'profile') updateProfile();
    });
    
    setPanel('home');
    console.log("✅ OlegTube с фото/видео работает!");
</script>
</body>
</html>
